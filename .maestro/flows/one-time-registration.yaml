# Phase 9 ONE-TIME fixture user registration flow.
#
# Walks the iOS Connect ID registration flow for the fixture phone number
# to create the single fixture user used by all subsequent Phase 9 tests.
# This flow is NOT idempotent — running it a second time hits "account
# exists" and routes to recovery. Use connect-id-recovery.yaml for
# idempotent repeat test runs.
#
# Actual iOS registration step order (per ConnectIdViewModel.kt:258):
#   PHONE_ENTRY → BIOMETRIC_SETUP → OTP_VERIFICATION → NAME_ENTRY →
#   BACKUP_CODE → PHOTO_CAPTURE → ACCOUNT_CREATION → SUCCESS
#
# Note: PIN setup comes BEFORE OTP, not after. This differs from what a
# reader might assume from the Android flow ordering.
#
# Required env (pass via --env KEY=VALUE on the maestro CLI):
#   CONNECTID_E2E_PHONE         full E.164, e.g. +74260000042
#   CONNECTID_E2E_PHONE_LOCAL   digits-only, e.g. 4260000042
#   CONNECTID_E2E_COUNTRY_CODE  e.g. +7
#   CONNECTID_E2E_PIN           6 digits, e.g. 142857
#
# Run:
#   set -a; source .env.e2e.local; set +a
#   JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home \
#   ~/.maestro/bin/maestro test \
#     -e "CONNECTID_E2E_PHONE=$CONNECTID_E2E_PHONE" \
#     -e "CONNECTID_E2E_PHONE_LOCAL=$CONNECTID_E2E_PHONE_LOCAL" \
#     -e "CONNECTID_E2E_COUNTRY_CODE=$CONNECTID_E2E_COUNTRY_CODE" \
#     -e "CONNECTID_E2E_PIN=$CONNECTID_E2E_PIN" \
#     .maestro/flows/one-time-registration.yaml
#
# After the flow completes, the backup code screenshot is at
# /tmp/phase9-backup-code.png. Read it to extract the generated code
# and add it to .env.e2e.local as CONNECTID_E2E_BACKUP_CODE.

appId: org.marshellis.commcare.ios

---

# ===== Step 1: SetupScreen =====

- launchApp:
    appId: "org.marshellis.commcare.ios"
    clearState: true

- extendedWaitUntil:
    visible:
      id: "signup_link"
    timeout: 30000

- tapOn:
    id: "signup_link"

# ===== Step 2: PHONE_ENTRY =====

- extendedWaitUntil:
    visible:
      id: "phone_number_field"
    timeout: 10000

- tapOn:
    id: "country_code_field"
- eraseText: 10
- inputText: ${CONNECTID_E2E_COUNTRY_CODE}

- tapOn:
    id: "phone_number_field"
- inputText: ${CONNECTID_E2E_PHONE_LOCAL}

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "consent_checkbox"

- tapOn:
    id: "continue_button"

# ===== Step 3: BIOMETRIC_SETUP (PIN entry on simulator) =====
#
# On iOS simulator without Face ID enrolled, BiometricSetupStep shows
# the PIN entry UI directly (showPinEntry defaults to !biometricAvailable).
# If biometric IS available, the user first sees use_biometric_button and
# use_pin_button as choices. We tap use_pin_button if it shows up, then
# type the PIN in either case.

- extendedWaitUntil:
    visible:
      id: "pin_field"
    optional: true
    timeout: 5000

- runFlow:
    when:
      visible:
        id: "use_pin_button"
    commands:
      - tapOn:
          id: "use_pin_button"
      - extendedWaitUntil:
          visible:
            id: "pin_field"
          timeout: 5000

- tapOn:
    id: "pin_field"
- inputText: ${CONNECTID_E2E_PIN}

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "set_pin_button"

# ===== Step 4: OTP_VERIFICATION (manual human step) =====
#
# Maestro pauses here and waits for the NAME_ENTRY screen to appear.
# The OTP screen (otp_field + verify_button) requires an OTP from the
# Dimagi connect_user_otp URL which only a Dimagi-SSO-authenticated
# user can fetch — Maestro can't automate this without OAuth2 client
# credentials from Dimagi (deferred — see docs/phase9/fixture-user.md).
#
# What the operator does here manually (~30-60 seconds):
#   1. Open https://connect.dimagi.com/users/connect_user_otp/ in a
#      browser signed into Dimagi SSO
#   2. Look up the OTP for +74260000042
#   3. Copy the 6-digit code
#   4. Tap the otp_field in the simulator and paste/type the code
#   5. Tap the Verify button in the simulator
#
# Once Verify succeeds the app advances to NameEntryStep and Maestro's
# extendedWaitUntil for full_name_field unblocks. Timeout is 180s to
# give the operator plenty of time.

- extendedWaitUntil:
    visible:
      id: "otp_field"
    timeout: 15000

# Take a screenshot of the OTP screen so the operator has confirmation
# Maestro is paused at the right place.
- takeScreenshot: /tmp/phase9-awaiting-otp

# Wait for the operator to fetch+type the OTP and tap Verify.
# When NameEntryStep is showing (full_name_field visible), proceed.
- extendedWaitUntil:
    visible:
      id: "full_name_field"
    timeout: 180000

- tapOn:
    id: "full_name_field"
- inputText: "Hal Test"

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "continue_button"

# ===== Step 6: BACKUP_CODE (capture screenshot!) =====

- extendedWaitUntil:
    visible:
      id: "continue_button"
    timeout: 15000

# Let the screen finish rendering before the screenshot.
- waitForAnimationToEnd:
    timeout: 2000

# Capture a screenshot of the backup code screen via Maestro's built-in.
# Note: in new-registration mode the user CHOOSES the backup code
# (this field is an input, not a display), so this screenshot is just
# a sanity-check that we reached the right screen with the right input.
- takeScreenshot: /tmp/phase9-backup-code-screen

# Type the chosen backup code
- tapOn:
    id: "backup_code_field"
- inputText: ${CONNECTID_E2E_BACKUP_CODE}

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "continue_button"

# ===== Step 7: PHOTO_CAPTURE =====

- extendedWaitUntil:
    visible:
      id: "skip_photo_button"
    timeout: 15000

- tapOn:
    id: "skip_photo_button"

# ===== Step 8: ACCOUNT_CREATION (spinner, optional brief state) =====

- extendedWaitUntil:
    visible:
      id: "account_creation_spinner"
    optional: true
    timeout: 3000

# ===== Step 9: SUCCESS =====

- extendedWaitUntil:
    visible:
      id: "done_button"
    timeout: 30000

- takeScreenshot: /tmp/phase9-registration-success
