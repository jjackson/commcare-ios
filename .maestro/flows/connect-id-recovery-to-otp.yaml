# Phase 9 Wave 1: Connect ID recovery — part A (launch → phone → PIN → OTP screen).
#
# Drives a fresh-simulator recovery for the already-registered fixture
# user. Same front half as one-time-registration-to-otp.yaml (the iOS
# app doesn't know whether it's registration or recovery until after
# check_name), so this flow is nearly identical — they just hand off
# to different part-B flows.
#
# After this flow exits, the orchestrator fetches an OTP via Playwright
# and runs connect-id-recovery-from-otp.yaml.
#
# Orchestrator: .maestro/scripts/run-recovery.sh

appId: org.marshellis.commcare.ios

---

- launchApp:
    appId: "org.marshellis.commcare.ios"
    clearState: true

- extendedWaitUntil:
    visible:
      id: "signup_link"
    timeout: 30000

- tapOn:
    id: "signup_link"

- extendedWaitUntil:
    visible:
      id: "phone_number_field"
    timeout: 10000

- tapOn:
    id: "country_code_field"
- eraseText: 10
- inputText: ${CONNECTID_E2E_COUNTRY_CODE}

- tapOn:
    id: "phone_number_field"
- inputText: ${CONNECTID_E2E_PHONE_LOCAL}

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "consent_checkbox"

- tapOn:
    id: "continue_button"

- extendedWaitUntil:
    visible:
      id: "pin_field"
    optional: true
    timeout: 5000

- runFlow:
    when:
      visible:
        id: "use_pin_button"
    commands:
      - tapOn:
          id: "use_pin_button"
      - extendedWaitUntil:
          visible:
            id: "pin_field"
          timeout: 5000

- tapOn:
    id: "pin_field"
- inputText: ${CONNECTID_E2E_PIN}

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "set_pin_button"

- extendedWaitUntil:
    visible:
      id: "otp_field"
    timeout: 15000
