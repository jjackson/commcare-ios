# Phase 9 Wave 1: Connect ID recovery flow (the first real E2E test).
#
# Walks the fixture user through "existing user, new device" recovery on a
# fresh simulator. This flow is idempotent: it can run on every nightly
# without polluting connect-id with new users, because it never registers a
# new account — it always recovers the same fixture user.
#
# *** BLOCKED BY A PRODUCT BUG (as of 2026-04-08) ***
# The iOS app crashes when the user taps set_pin_button during
# BiometricSetupStep. Recovery flow goes through BiometricSetupStep on a
# fresh simulator, so this flow cannot run until the crash is fixed in
# app code. See the PinSetupCrashLearnings doc once filed.
#
# Actual iOS registration/recovery step order (per ConnectIdViewModel.kt:258):
#   PHONE_ENTRY → BIOMETRIC_SETUP → OTP_VERIFICATION → NAME_ENTRY →
#   BACKUP_CODE → (recovery: SUCCESS / new: PHOTO_CAPTURE → ACCOUNT_CREATION → SUCCESS)
#
# Run (once crash is fixed):
#   set -a; source .env.e2e.local; set +a
#   JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home \
#   ~/.maestro/bin/maestro test \
#     -e "CONNECTID_E2E_PHONE=$CONNECTID_E2E_PHONE" \
#     -e "CONNECTID_E2E_PHONE_LOCAL=$CONNECTID_E2E_PHONE_LOCAL" \
#     -e "CONNECTID_E2E_COUNTRY_CODE=$CONNECTID_E2E_COUNTRY_CODE" \
#     -e "CONNECTID_E2E_BACKUP_CODE=$CONNECTID_E2E_BACKUP_CODE" \
#     -e "CONNECTID_E2E_PIN=$CONNECTID_E2E_PIN" \
#     .maestro/flows/connect-id-recovery.yaml
#
# The `env:` block syntax in the flow file was tested and does NOT pass
# shell env vars through to the flow body — use the `-e` CLI flag instead
# (verified 2026-04-08).

appId: org.marshellis.commcare.ios

---

# Start from a guaranteed-fresh app state.
- launchApp:
    appId: "org.marshellis.commcare.ios"
    clearState: true

# Wait for SetupScreen by waiting for the PersonalID signup button.
- extendedWaitUntil:
    visible:
      id: "signup_link"
    timeout: 30000

# Walk the recovery flow.
- runFlow:
    file: ../subflows/recover-connect-id.yaml

# After recovery, the app routes to either the SuccessStep done button or
# directly to the home screen. Either is acceptable as proof of success.
# Assert on whichever element the build actually shows.
- extendedWaitUntil:
    visible:
      id: "done_button"
    optional: true
    timeout: 10000

- runFlow:
    when:
      visible:
        id: "done_button"
    commands:
      - tapOn:
          id: "done_button"

# Final assertion: home screen "Start" button is visible. This is the same
# selector login-and-home.yaml uses, so we know it identifies the home
# screen unambiguously.
- extendedWaitUntil:
    visible: "Start"
    timeout: 15000

# Capture a visual baseline on success. Later waves can compare against this
# artifact to catch unexpected UI regressions on the home screen.
- takeScreenshot: wave1-recovery-success
