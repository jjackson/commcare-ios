# Wave 7: full opportunity detail → claim → learn flow.
# Precondition: at the Opportunities list with items visible.

appId: org.marshellis.commcare.ios

---

- extendedWaitUntil:
    visible:
      text: "Demo Opp"
    timeout: 15000

# Tap View Info
- tapOn:
    text: "View Info"
    index: 0
- waitForAnimationToEnd: {timeout: 10000}

- takeScreenshot: /tmp/phase9-wave7-detail-1

# Tap Start Learning (claims the opportunity)
- tapOn:
    text: "Start Learning"
- waitForAnimationToEnd: {timeout: 15000}

- takeScreenshot: /tmp/phase9-wave7-detail-after-claim

# Swipe up to scroll down
- swipe:
    start: "50%,80%"
    end: "50%,30%"
- waitForAnimationToEnd: {timeout: 3000}

- takeScreenshot: /tmp/phase9-wave7-detail-scrolled
