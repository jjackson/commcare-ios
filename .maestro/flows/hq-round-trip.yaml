# Full HQ round-trip E2E test:
#   Login → Sync → Navigate to form → Fill form → Submit → Sync again
#
# Run:
#   .maestro/run.sh .maestro/flows/hq-round-trip.yaml
appId: org.commcare.ios

env:
  COMMCARE_HQ_URL: ${COMMCARE_HQ_URL}
  COMMCARE_USERNAME: ${COMMCARE_USERNAME}
  COMMCARE_PASSWORD: ${COMMCARE_PASSWORD}
  COMMCARE_DOMAIN: ${COMMCARE_DOMAIN}
  COMMCARE_APP_ID: ${COMMCARE_APP_ID}

---

# ---- Step 1: Login with full app install ----
- runFlow: login-with-app.yaml

# Verify we're on the home screen
- assertVisible: "Start"
- assertVisible: "Sync"

# ---- Step 2: Initial sync ----
- tapOn: "Sync"
- assertVisible: "Sync Now"
- tapOn: "Sync Now"

# Wait for sync to complete
- extendedWaitUntil:
    visible: "Sync complete"
    timeout: 60000

# Go back to home
- tapOn: "Back"

# ---- Step 3: Navigate through menus into a form ----
- tapOn: "Start"
- waitForAnimationToEnd:
    timeout: 5000

# Bonsaaso app structure: Start → menus (m0..m3) → forms
# Try each module until we find one that opens a form without needing cases.
# m3 is often a standalone registration module.
- tapOn: "m3"
- waitForAnimationToEnd:
    timeout: 5000

# If this is a form list, tap the first form
- runFlow:
    when:
      visible: "m3-f0"
    commands:
      - tapOn: "m3-f0"
      - waitForAnimationToEnd:
          timeout: 5000

# If we're on a case list with cases, select first case
- runFlow:
    when:
      visible: "Select Case"
    commands:
      - runFlow:
          when:
            notVisible: "No cases found"
          commands:
            - tapOn:
                text: ".*"
                index: 2
            - waitForAnimationToEnd:
                timeout: 5000

# ---- Step 4: Fill the form ----
- extendedWaitUntil:
    visible: "Next"
    timeout: 30000

# Answer text question if visible
- runFlow:
    when:
      visible: "Answer"
    commands:
      - tapOn: "Answer"
      - inputText: "Maestro E2E test"

# Navigate through the form using repeat
- evalScript: ${output.formDone = 0}

- runFlow:
    when:
      visible: "Form Complete"
    commands:
      - evalScript: ${output.formDone = 1}

- repeat:
    while:
      true: ${output.formDone == 0}
    commands:
      - tapOn: "Next"
      - waitForAnimationToEnd:
          timeout: 3000
      - runFlow:
          when:
            visible: "Form Complete"
          commands:
            - evalScript: ${output.formDone = 1}
      # Answer text fields on new pages
      - runFlow:
          when:
            visible: "Answer"
          commands:
            - tapOn: "Answer"
            - inputText: "Maestro E2E"

# ---- Step 5: Submit the form ----
- assertVisible: "Form Complete"
- assertVisible: "Submit"
- tapOn: "Submit"

# Should return to home landing
- extendedWaitUntil:
    visible: "Start"
    timeout: 30000

# ---- Step 6: Verify form queued and sync ----
- tapOn: "Sync"

# Submit any pending forms
- runFlow:
    when:
      visible: "Submit All"
    commands:
      - tapOn: "Submit All"
      - extendedWaitUntil:
          visible: "Submitted"
          timeout: 60000

# Final sync to confirm server accepted it
- tapOn: "Sync Now"
- extendedWaitUntil:
    visible: "Sync complete"
    timeout: 60000

# Go back and verify app is in good state
- tapOn: "Back"
- assertVisible: "Start"
