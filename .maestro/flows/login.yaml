# Shared login flow — included by other tests via runFlow.
# Expects env: COMMCARE_USERNAME, COMMCARE_PASSWORD
appId: org.marshellis.commcare.ios

---

- launchApp:
    appId: "org.marshellis.commcare.ios"
    clearState: true

# Wait for login screen to appear
- extendedWaitUntil:
    visible: "Log In"
    timeout: 10000

# Fill Username (using testTag ID to avoid CMP label tap misalignment)
- tapOn:
    id: "username_field"
- inputText: "${COMMCARE_USERNAME}"

# Dismiss keyboard
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

# Fill Password
- tapOn:
    id: "password_field"
- inputText: "${COMMCARE_PASSWORD}"

# Dismiss keyboard
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

# Tap Log In
- tapOn: "Log In"

# Wait for install/restore to complete
- extendedWaitUntil:
    visible: "Start"
    timeout: 120000
