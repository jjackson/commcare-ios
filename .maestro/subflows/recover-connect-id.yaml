# Phase 9 shared subflow: log in the fixture user via the Connect ID recovery
# branch from a fresh simulator state. Used by Wave 1 directly and inherited
# by every later wave that needs an authenticated Connect session.
#
# Requires:
#   CONNECTID_E2E_PHONE        (fixture phone, +7426...)
#   CONNECTID_E2E_PHONE_LOCAL  (digits after the country code, no +)
#   CONNECTID_E2E_COUNTRY_CODE (country code with leading +, e.g. +7)
#   CONNECTID_E2E_BACKUP_CODE  (fixture backup code from manual registration)
#   CONNECTID_E2E_OTP          (fetched externally via Playwright before invoking this subflow)
#   CONNECTID_E2E_CLIENT_SECRET
#
# Caller is responsible for the launchApp + clearState. This subflow assumes
# the app is launched and at the SetupScreen.

appId: org.marshellis.commcare.ios

---

# Tap "LOGIN WITH PERSONALID" on the setup screen.
- tapOn:
    id: "signup_link"

# Wait for the phone entry screen.
- extendedWaitUntil:
    visible:
      id: "phone_number_field"
    timeout: 10000

# Enter the fixture phone number. The country code field defaults to
# the user's locale; we tap the country code field and clear it just in
# case the simulator's locale doesn't match +7426.
- tapOn:
    id: "country_code_field"
- eraseText: 10
- inputText: ${CONNECTID_E2E_COUNTRY_CODE}

- tapOn:
    id: "phone_number_field"
# CONNECTID_E2E_PHONE_LOCAL is the digits-only portion of the fixture phone
# number (without the + and country code). Maestro reads it from the parent
# shell environment via the workflow env block.
- inputText: ${CONNECTID_E2E_PHONE_LOCAL}

# Dismiss keyboard before tapping the consent checkbox.
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

# PhoneEntryStep's Continue button is disabled until the consent checkbox
# is checked. The checkbox must be tapped after entering the phone number
# but before the Continue tap.
- tapOn:
    id: "consent_checkbox"

- tapOn:
    id: "continue_button"

# The server should detect the existing account and route to the recovery
# branch. Wait for the OTP field to appear.
- extendedWaitUntil:
    visible:
      id: "otp_field"
    timeout: 15000

# OTP is injected by the orchestrator via -e CONNECTID_E2E_OTP=VALUE.
# The orchestrator runs .maestro/scripts/playwright/fetch-otp.js against
# the Dimagi connect_user_otp URL (with cached Dimagi SSO cookies) and
# passes the fetched value to Maestro. See .maestro/scripts/run-registration.sh
# for the registration equivalent.
- tapOn:
    id: "otp_field"
- inputText: ${CONNECTID_E2E_OTP}
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "verify_button"

# Recovery requires the backup code. Wait for the backup code field.
- extendedWaitUntil:
    visible:
      id: "backup_code_field"
    timeout: 15000

- tapOn:
    id: "backup_code_field"
- inputText: ${CONNECTID_E2E_BACKUP_CODE}
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: "continue_button"

# At this point recovery should complete and the app should land on either
# the SuccessStep done button or the home screen (depending on the build).
# Wave 1 asserts on the post-recovery state in connect-id-recovery.yaml.
