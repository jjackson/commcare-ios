name: iOS Build & Test

on:
  pull_request:
    paths:
      - 'app/**'
      - 'commcare-core/**'
      - '.github/workflows/ios-build.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x commcare-core/gradlew app/gradlew

      - name: Run commcare-core iOS tests
        working-directory: commcare-core
        run: ./gradlew iosSimulatorArm64Test --no-daemon --stacktrace

      - name: Build commcare-core iOS framework
        working-directory: commcare-core
        run: ./gradlew linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace

      - name: Build iOS app framework
        working-directory: app
        run: ./gradlew linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace
