name: iOS Build & Test

# Disabled: KMP iOS targets don't exist yet (Phase 2).
# Re-enable once commcare-core has iosSimulatorArm64 target and app/ exists.
on:
  pull_request:
    paths:
      - 'app/**'
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  build:
    if: false  # disabled until iOS/KMP targets exist
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework
        run: ./gradlew :commcare-core:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Build iOS app
        run: ./gradlew :app:composeApp:iosSimulatorArm64Test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: app/composeApp/build/reports/tests/
