name: CommCare Core Tests

on:
  pull_request:
    paths:
      - 'commcare-core/**'
      - 'app/**'
      - '.github/workflows/kotlin-tests.yml'
  push:
    branches: [main]
    paths:
      - 'commcare-core/**'
      - 'app/**'
      - '.github/workflows/kotlin-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: commcare-core
        run: chmod +x ./gradlew

      - name: Build and test commcare-core
        working-directory: commcare-core
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run app JVM tests
        run: ./gradlew :app:jvmTest --no-daemon --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            commcare-core/build/reports/tests/
            app/build/reports/tests/
