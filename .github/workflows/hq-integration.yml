name: HQ Integration Tests

on:
  # Manual trigger with optional credentials override
  workflow_dispatch:
    inputs:
      hq_url:
        description: 'CommCare HQ URL'
        required: false
        default: 'https://www.commcarehq.org'

  # Weekly schedule — runs against staging/test HQ
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x app/gradlew

      - name: Check credentials
        id: check_creds
        env:
          COMMCARE_USERNAME: ${{ secrets.COMMCARE_USERNAME }}
        run: |
          if [ -z "$COMMCARE_USERNAME" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ HQ credentials not configured — skipping integration tests"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run HQ integration tests
        if: steps.check_creds.outputs.skip != 'true'
        working-directory: app
        env:
          COMMCARE_HQ_URL: ${{ inputs.hq_url || secrets.COMMCARE_HQ_URL || 'https://www.commcarehq.org' }}
          COMMCARE_USERNAME: ${{ secrets.COMMCARE_USERNAME }}
          COMMCARE_PASSWORD: ${{ secrets.COMMCARE_PASSWORD }}
          COMMCARE_APP_ID: ${{ secrets.COMMCARE_APP_ID }}
          COMMCARE_DOMAIN: ${{ secrets.COMMCARE_DOMAIN }}
        run: |
          ./gradlew jvmTest --tests "*HqIntegrationTest*" --no-daemon --stacktrace
        timeout-minutes: 10

      - name: Run Connect Integration Tests
        if: env.CONNECT_ACCESS_TOKEN != ''
        env:
          CONNECT_ACCESS_TOKEN: ${{ secrets.CONNECT_ACCESS_TOKEN }}
          CONNECT_USERNAME: ${{ secrets.CONNECT_USERNAME }}
          CONNECT_PASSWORD: ${{ secrets.CONNECT_PASSWORD }}
        working-directory: app
        run: |
          ./gradlew jvmTest \
            --tests "*ConnectIdIntegrationTest*" \
            --tests "*ConnectMarketplaceIntegrationTest*" \
            --tests "*ConnectMessagingIntegrationTest*" \
            --no-daemon --stacktrace
        timeout-minutes: 5

      - name: Report results
        if: always()
        run: |
          echo "## HQ Integration Test Results" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ All integration tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Integration tests failed — check logs" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**HQ URL:** ${{ inputs.hq_url || 'default' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
